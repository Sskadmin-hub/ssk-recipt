<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Payment History</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; }
        
        /* Login Overlay */
        #admin-login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a2a3a; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 320px;
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; 
            border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #007bff; color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        /* Dashboard */
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 13px; }
        th { background-color: #0056b3; color: white; text-transform: uppercase; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; }
        
        .footer-btns { margin-top: 30px; text-align: center; padding-bottom: 50px; }
        .footer-btns button { padding: 12px 25px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        
        .btn-print { background: #28a745; color: white; }
        .btn-delete-all { background: #dc3545; color: white; }
        .btn-exit { background: #6c757d; color: white; }

        /* A4 Landscape Print */
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            #admin-login-overlay, .footer-btns, .delete-btn, h2 { display: none !important; }
            body { background: white; }
            table { width: 100%; border: 1px solid black; }
            th, td { border: 1px solid black; color: black; }
        }
    </style>
</head>
<body>

    <div id="admin-login-overlay">
        <div class="login-box">
            <h3>Admin Access</h3>
            <input type="password" id="admin-pass-input" placeholder="Enter Code">
            <button id="login-btn">Login</button>
            <p id="error-msg" style="color: red; font-size: 13px; margin-top: 15px; display: none;">Invalid Code!</p>
        </div>
    </div>

    <div id="dashboard-content" style="display: none;">
        <div class="container">
            <h2>Payment History Ledger</h2>
            <table id="receipts-table">
                <thead>
                    <tr>
                        <th>Guardian</th>
                        <th>Student</th>
                        <th>Class</th>
                        <th>Month</th>
                        <th>Amount</th>
                        <th>Purpose</th>
                        <th>Date | Time</th>
                        <th>Receiver</th>
                        <th>Code</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>

            <div class="footer-btns">
                <button class="btn-print" id="print-btn">Print (A4 Landscape)</button>
                <button class="btn-delete-all" id="delete-all-btn">Delete All Data</button>
                <button class="btn-exit" id="exit-btn">Exit</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // === STEP 1: APNA CONFIG YAHAN DALEIN ===
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "ssk-receipt-e8619.firebaseapp.com",
            projectId: "ssk-receipt-e8619",
            storageBucket: "ssk-receipt-e8619.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // === STEP 2: LOGIN LOGIC ===
        const loginBtn = document.getElementById('login-btn');
        const passInput = document.getElementById('admin-pass-input');

        loginBtn.addEventListener('click', () => {
            const secret = "7890"; // Aapka Code
            if(passInput.value === secret) {
                document.getElementById('admin-login-overlay').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
                loadData();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        // === STEP 3: DATA LOAD LOGIC ===
        function loadData() {
            onSnapshot(collection(db, "receipts"), (snapshot) => {
                const tbody = document.getElementById("table-body");
                tbody.innerHTML = "";
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${data.parent || 'N/A'}</td>
                        <td>${data.student || ''}</td>
                        <td>${data.class || ''}</td>
                        <td>${data.month || ''}</td>
                        <td>${data.amount || ''}</td>
                        <td>${data.purpose || ''}</td>
                        <td>${(data.date || '')} | ${(data.time || '')}</td>
                        <td>${data.receiver || ''}</td>
                        <td>${data.code || ''}</td>
                        <td><button class="del-row-btn" data-id="${id}" style="background:#ff4d4d; color:white; border:none; padding:5px; cursor:pointer; border-radius:4px;">Delete</button></td>
                    `;
                    tbody.appendChild(row);
                });

                // Attach delete event to buttons
                document.querySelectorAll('.del-row-btn').forEach(btn => {
                    btn.onclick = () => deleteSingleRecord(btn.getAttribute('data-id'));
                });
            });
        }

        // === STEP 4: DELETE & ACTION FUNCTIONS ===
        async function deleteSingleRecord(id) {
            if(confirm("Record delete karein?")) {
                await deleteDoc(doc(db, "receipts", id));
            }
        }

        document.getElementById('delete-all-btn').onclick = async () => {
            if(confirm("Chetavni: Saara data permanent delete ho jayega!")) {
                const querySnapshot = await getDocs(collection(db, "receipts"));
                querySnapshot.forEach(async (d) => {
                    await deleteDoc(doc(db, "receipts", d.id));
                });
            }
        };

        document.getElementById('print-btn').onclick = () => window.print();
        document.getElementById('exit-btn').onclick = () => window.close();

    </script>
</body>
</html>
